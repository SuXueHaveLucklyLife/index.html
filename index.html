<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業投資研究手冊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1F3864;--blue:#2E5FA3;--light-blue:#D6E4F7;--mid-blue:#BDD7EE;
  --accent:#C9A84C;--light-gray:#F7F8FA;--mid-gray:#E2E8F0;--dark-gray:#4A5568;
  --text:#1A202C;--success:#276749;--success-bg:#F0FFF4;--danger:#9B2C2C;--danger-bg:#FFF5F5;
  --border:#CBD5E0;--radius:8px;--font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);color:var(--text);background:#F0F4F8;min-height:100vh}
#app{display:flex;min-height:100vh}
#sidebar{width:260px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:100}
#main{margin-left:260px;flex:1;min-height:100vh}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
#menu-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--navy);font-size:20px;line-height:1}
@media(max-width:680px){
  #sidebar{transform:translateX(-100%);transition:transform .25s;z-index:100}
  #sidebar.open{transform:translateX(0)}
  #overlay.open{display:block}
  #main{margin-left:0}
  #menu-btn{display:flex;align-items:center}
  .topbar-actions .btn:not(.btn-primary){display:none}
}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-header h1{font-size:14px;font-weight:700;color:#fff}
.sidebar-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-section{padding:8px 0}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.4);padding:8px 16px 4px;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.75);border-left:3px solid transparent;transition:all .15s}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--accent)}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar h2{font-size:16px;font-weight:600;color:var(--navy)}
.topbar-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--dark-gray);transition:all .15s}
.btn:hover{background:var(--light-gray)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:#162d52}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:#FEB2B2}
#page{padding:24px;max-width:960px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--navy)}
.stat-card .lbl{font-size:12px;color:var(--dark-gray);margin-top:4px}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.company-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .2s}
.company-card:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(46,95,163,.1)}
.co-name{font-size:15px;font-weight:700;color:var(--navy)}
.co-code{font-size:12px;color:var(--dark-gray);margin-top:2px}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;background:var(--light-blue);color:var(--navy)}
.tag.industry{background:#EBF8FF;color:#2B6CB0}
.tag.stage{background:#F0FFF4;color:var(--success)}
.tag.difficulty-low{background:#F0FFF4;color:var(--success)}
.tag.difficulty-mid{background:#FFFBF0;color:#744210}
.tag.difficulty-high{background:#FFF5F5;color:var(--danger)}
.co-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.progress-bar{height:6px;background:var(--mid-gray);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dark-gray);margin-top:4px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.filter-select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:#fff}
.search-input{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;min-width:200px}
.search-input:focus{outline:none;border-color:var(--blue)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:17px;font-weight:700;color:var(--navy)}
.modal-body{overflow-y:auto;padding:24px;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--dark-gray);padding:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--dark-gray);margin-bottom:6px}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:var(--font);color:var(--text)}
.form-control:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chapter-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:10px}
.ch-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--dark-gray);transition:all .15s}
.ch-btn:hover{border-color:var(--blue);color:var(--blue)}
.ch-btn.done{background:var(--success-bg);border-color:#9AE6B4;color:var(--success)}
.ch-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}
.chapter-card{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.chapter-title{padding:16px 20px;background:var(--navy);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.ch-check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ch-check.done{background:rgba(255,255,255,.9);border-color:transparent;color:var(--navy)}
.chapter-body{padding:20px}
.section-heading{font-size:13px;font-weight:700;color:var(--blue);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--light-blue);padding-bottom:4px}
.research-box{background:#EBF8FF;border:1px solid #BEE3F8;border-left:4px solid var(--blue);border-radius:var(--radius);padding:16px;margin-top:16px}
.research-box .rb-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.source-box{background:#FFFBF0;border:1px solid #FAD089;border-left:4px solid var(--accent);border-radius:var(--radius);padding:16px;margin-top:12px}
.source-box .rb-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

/* ── RICH TEXT EDITOR ── */
.rte-wrap{margin-bottom:16px}
.rte-label{display:block;font-size:13px;font-weight:600;color:var(--dark-gray);margin-bottom:4px}
.rte-toolbar{display:flex;gap:2px;padding:4px 6px;background:var(--light-gray);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0}
.rte-toolbar button{background:none;border:1px solid transparent;border-radius:4px;padding:2px 7px;font-size:12px;cursor:pointer;color:var(--dark-gray);font-family:var(--font);line-height:1.6}
.rte-toolbar button:hover{background:#fff;border-color:var(--border)}
.rte-toolbar button.active{background:#fff;border-color:var(--blue);color:var(--blue)}
.rte-toolbar .sep{width:1px;background:var(--border);margin:2px 4px}
.rte-editor{min-height:36px;padding:8px 12px;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);font-size:14px;font-family:var(--font);color:var(--text);background:#fff;outline:none;line-height:1.7;word-break:break-word}
.rte-editor:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.1)}
.rte-editor:empty:before{content:attr(data-placeholder);color:#a0aec0;pointer-events:none}
.rte-editor ul{padding-left:1.4em;list-style:disc}
.rte-editor ol{padding-left:1.4em;list-style:decimal}
.rte-editor li{margin:2px 0}
.rte-editor strong{font-weight:700}
.rte-editor em{font-style:italic}
.rte-editor p{margin:0;min-height:1.4em}

/* ── TABLE INPUT ── */
.table-wrap{overflow-x:auto;margin:8px 0}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--mid-blue);color:var(--navy);font-weight:600;padding:8px 10px;text-align:left;border:1px solid var(--border)}
.tbl td{border:1px solid var(--border);vertical-align:top;padding:0}
.tbl tr:nth-child(even) td{background:#f8fafc}
.tbl-cell{min-height:34px;padding:6px 8px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.tbl-cell:focus{background:var(--light-blue)}
.tbl-cell:empty:before{content:attr(data-ph);color:#a0aec0;pointer-events:none;font-style:italic}
.tbl-cell ul{padding-left:1.2em;list-style:disc}
.tbl-cell ol{padding-left:1.2em;list-style:decimal}
.tbl-cell strong{font-weight:700}
.tbl-cell em{font-style:italic}
.row-del-btn{background:none;border:none;color:#cbd5e0;font-size:13px;cursor:pointer;padding:6px;line-height:1;width:100%;height:100%}
.row-del-btn:hover{color:var(--danger)}
.add-row-btn{margin-top:6px;font-size:12px;padding:4px 12px}

/* check list */
.check-list{list-style:none}
.check-list li{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--mid-gray);font-size:13px;color:var(--dark-gray)}
.check-list li:last-child{border-bottom:none}
.check-list li input[type=checkbox]{margin-top:2px;accent-color:var(--blue);width:15px;height:15px;flex-shrink:0;cursor:pointer}

.empty-state{text-align:center;padding:60px 20px;color:var(--dark-gray)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:18px;font-weight:600;color:var(--navy);margin-bottom:8px}
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header"><h1>研究手冊</h1><p>Equity Research Workbook</p></div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">主選單</div>
      <div class="sidebar-item active" data-page="dashboard">總覽儀表板</div>
      <div class="sidebar-item" data-page="companies">所有公司</div>
      <div class="sidebar-item" data-page="progress">研究進度</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">依產業篩選</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="半導體">半導體</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="電子代工">電子代工</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="金融">金融</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="消費">消費</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="電信">電信</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="原物料">原物料</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="航運">航運</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="其他">其他</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">依階段篩選</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="1">① 公司基礎</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="2">② 財報分析</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="3">③ 報酬風險</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="4">④ 產業總體</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="5">⑤ 投資整合</div>
    </div>
    <div style="padding:16px;margin-top:auto;border-top:1px solid rgba(255,255,255,.1)">
      <button class="btn btn-accent" onclick="showModal('addCompany')" style="width:100%;justify-content:center">+ 新增公司</button>
    </div>
  </nav>
  <div id="overlay" onclick="closeSidebar()"></div>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button id="menu-btn" onclick="toggleSidebar()">☰</button>
        <h2 id="page-title">總覽儀表板</h2>
      </div>
      <div class="topbar-actions">
        <button class="btn" onclick="exportData()">⬇ 匯出備份</button>
        <button class="btn btn-primary" onclick="showModal('addCompany')">+ 新增公司</button>
      </div>
    </div>
    <div id="page"><div style="padding:60px;text-align:center;color:var(--dark-gray)"><div style="font-size:32px;margin-bottom:12px">⏳</div><div>正在從雲端載入資料…</div></div></div>
  </div>
</div>

<!-- Modals -->
<div id="modal-addCompany" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header"><h3>新增研究公司</h3><button class="close-btn" onclick="closeModal('addCompany')">✕</button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>公司名稱 *</label><input class="form-control" id="new-name" placeholder="例：台積電"></div>
        <div class="form-group"><label>股票代號</label><input class="form-control" id="new-code" placeholder="例：2330"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>產業別</label>
          <select class="form-control" id="new-industry">
            <option>半導體</option><option>電子代工</option><option>金融</option>
            <option>消費</option><option>電信</option><option>原物料</option><option>航運</option><option>其他</option>
          </select></div>
        <div class="form-group"><label>研究難度</label>
          <select class="form-control" id="new-difficulty">
            <option value="low">低</option><option value="mid" selected>中</option><option value="high">中高</option>
          </select></div>
      </div>
      <div class="form-group"><label>所屬階段</label>
        <select class="form-control" id="new-stage">
          <option value="1">第一階段 — 公司與產業基礎</option>
          <option value="2">第二階段 — 財報與企業價值</option>
          <option value="3">第三階段 — 報酬風險與統計</option>
          <option value="4">第四階段 — 產業與總體環境</option>
          <option value="5">第五階段 — 投資判斷整合</option>
        </select></div>
      <div class="form-group"><label>簡要說明（選填）</label><textarea class="form-control" id="new-desc" placeholder="一句話說明主要業務…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('addCompany')">取消</button>
      <button class="btn btn-primary" onclick="addCompany()">建立研究檔案</button>
    </div>
  </div>
</div>

<div id="modal-deleteConfirm" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h3>確認刪除</h3><button class="close-btn" onclick="closeModal('deleteConfirm')">✕</button></div>
    <div class="modal-body"><p style="font-size:14px;line-height:1.7">確定要刪除 <strong id="delete-company-name"></strong> 的研究檔案嗎？此操作無法復原。</p></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('deleteConfirm')">取消</button>
      <button class="btn btn-danger" id="confirm-delete-btn">確認刪除</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── SUPABASE ────────────────────────────────────────────
const SUPABASE_URL='https://vyaspotauebgkymdgiyx.supabase.co';
const SUPABASE_KEY='sb_publishable_9uxCNxnLtLSnfsSGdmUwQQ_2Wa5XlEh';
const STORAGE_KEY='equity_research_db';
const ROW_ID=1;

async function loadFromCloud(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/research_data?id=eq.${ROW_ID}&select=data`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const rows=await res.json();
    if(rows&&rows.length>0&&rows[0].data) return JSON.parse(rows[0].data);
  }catch(e){console.warn('雲端載入失敗',e);}
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"companies":[]}');
}
async function saveToCloud(data){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/research_data`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,
        'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:ROW_ID,data:JSON.stringify(data)})
    });
  }catch(e){console.warn('雲端儲存失敗',e);}
}
function save(data){saveToCloud(data);}

// ── CHAPTERS ────────────────────────────────────────────
const CHAPTERS=[
  {id:'c1',title:'一、公司基本資料與定位'},
  {id:'c2',title:'二、商業模式與價值鏈分析'},
  {id:'c3',title:'三、管理層分析與資本配置'},
  {id:'c4',title:'四、護城河與競爭優勢'},
  {id:'c5',title:'五、產業分析與市場結構'},
  {id:'c6',title:'六、經濟學專題思考'},
  {id:'c7',title:'七、總體經濟與景氣循環'},
  {id:'c8',title:'八、財務報表分析'},
  {id:'c9',title:'九、財報品質分析'},
  {id:'c10',title:'十、同業比較分析'},
  {id:'c11',title:'十一、估值分析與股東結構'},
  {id:'c12',title:'十二、風險分析'},
  {id:'c13',title:'十三、證據矩陣'},
  {id:'c14',title:'十四、投資論文與決策'},
];

// ── STATE ───────────────────────────────────────────────
let db={companies:[]};
let currentPage='dashboard',currentCompanyId=null,activeChapter='c1';
let filterIndustry='',filterStage='';

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── ROUTING ─────────────────────────────────────────────
function navigate(page,opts={}){
  currentPage=page;
  if(opts.companyId)currentCompanyId=opts.companyId;
  if(opts.chapter)activeChapter=opts.chapter;
  if(opts.industry!==undefined)filterIndustry=opts.industry;
  if(opts.stage!==undefined)filterStage=opts.stage;
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const sel=page==='dashboard'?'[data-page="dashboard"]':page==='progress'?'[data-page="progress"]':'[data-page="companies"]';
  document.querySelector(sel)?.classList.add('active');
  render();
}
document.querySelectorAll('.sidebar-item').forEach(el=>el.addEventListener('click',()=>{
  navigate(el.dataset.page,{industry:el.dataset.filterIndustry||'',stage:el.dataset.filterStage||''});
  closeSidebar();
}));

// ── RICH TEXT EDITOR ────────────────────────────────────
function rte(fieldId,placeholder,savedHTML=''){
  const tid=`tb_${fieldId}`;
  const eid=`ed_${fieldId}`;
  return `<div class="rte-wrap">
    <div class="rte-toolbar" id="${tid}">
      <button onmousedown="event.preventDefault();fmt('bold')" title="粗體 Ctrl+B"><b>B</b></button>
      <button onmousedown="event.preventDefault();fmt('italic')" title="斜體 Ctrl+I"><i>I</i></button>
      <div class="sep"></div>
      <button onmousedown="event.preventDefault();fmtList('ul')" title="無序清單">• 清單</button>
      <button onmousedown="event.preventDefault();fmtList('ol')" title="有序清單">1. 清單</button>
    </div>
    <div class="rte-editor" id="${eid}" contenteditable="true"
      data-field="${fieldId}" data-placeholder="${placeholder}"
      onfocus="updateToolbar(this)"
      onkeyup="updateToolbar(this)"
      onmouseup="updateToolbar(this)"
    >${savedHTML}</div>
  </div>`;
}

function fmt(cmd){document.execCommand(cmd,false,null);}
function fmtList(type){
  const cmd=type==='ul'?'insertUnorderedList':'insertOrderedList';
  document.execCommand(cmd,false,null);
}
function updateToolbar(el){
  const tb=el.closest('.rte-wrap')?.querySelector('.rte-toolbar');
  if(!tb)return;
  tb.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  if(document.queryCommandState('bold'))tb.querySelector('button:nth-child(1)')?.classList.add('active');
  if(document.queryCommandState('italic'))tb.querySelector('button:nth-child(2)')?.classList.add('active');
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();fmt('bold');}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();fmt('italic');}
});

// ── TABLE INPUT ─────────────────────────────────────────
// textareaCols: array of col indices that use RTE instead of plain div
function tblInput(id,headers,defaultRows,data={},expandable=false,rteCols=[]){
  const savedCount=parseInt(data[`${id}__rc`]||'0',10);
  const rowCount=expandable?Math.max(defaultRows.length,savedCount):defaultRows.length;
  const delCol=expandable?'<th style="width:32px"></th>':'';
  const ths=headers.map(h=>`<th>${h}</th>`).join('')+delCol;

  let trs='';
  for(let ri=0;ri<rowCount;ri++){
    const defaults=defaultRows[ri]||defaultRows[0].map(()=>'');
    const tds=defaults.map((ph,ci)=>{
      const key=`${id}__${ri}_${ci}`;
      const val=data[key]||'';
      if(rteCols.includes(ci)){
        // RTE cell
        return `<td><div class="tbl-cell rte-editor" contenteditable="true"
          data-field="${key}" data-placeholder="${ph}"
          onfocus="updateToolbar(this)" onkeyup="updateToolbar(this)" onmouseup="updateToolbar(this)"
        >${val}</div></td>`;
      }
      return `<td><div class="tbl-cell" contenteditable="true"
        data-field="${key}" data-ph="${ph}"
        suppressContentEditableWarning="true"
      >${val}</div></td>`;
    }).join('');
    const delTd=expandable?`<td style="text-align:center"><button class="row-del-btn" onmousedown="event.preventDefault();delRow('${id}',this)">✕</button></td>`:'';
    trs+=`<tr>${tds}${delTd}</tr>`;
  }
  const addBtn=expandable?`<button class="btn add-row-btn" onmousedown="event.preventDefault();addRow('${id}',${JSON.stringify(defaultRows[0])},${JSON.stringify(rteCols)})">+ 新增一列</button>`:'';
  return `<div class="table-wrap"><table class="tbl" id="tbl_${id}">
    <thead><tr>${ths}</tr></thead>
    <tbody id="tbody_${id}">${trs}</tbody>
  </table></div>
  ${addBtn}
  <input type="hidden" data-field="${id}__rc" value="${rowCount}">`;
}

function addRow(id,defaultCols,rteCols){
  const tbody=document.getElementById('tbody_'+id);
  const ri=tbody.querySelectorAll('tr').length;
  const tr=document.createElement('tr');
  let tds=defaultCols.map((ph,ci)=>{
    const key=`${id}__${ri}_${ci}`;
    if(rteCols.includes(ci)){
      return `<td><div class="tbl-cell rte-editor" contenteditable="true"
        data-field="${key}" data-placeholder="${ph}"
        onfocus="updateToolbar(this)" onkeyup="updateToolbar(this)" onmouseup="updateToolbar(this)"
      ></div></td>`;
    }
    return `<td><div class="tbl-cell" contenteditable="true" data-field="${key}" data-ph="${ph}"></div></td>`;
  }).join('');
  tds+=`<td style="text-align:center"><button class="row-del-btn" onmousedown="event.preventDefault();delRow('${id}',this)">✕</button></td>`;
  tr.innerHTML=tds;
  tbody.appendChild(tr);
  const rc=document.querySelector(`[data-field="${id}__rc"]`);
  if(rc)rc.value=ri+1;
  bindEditorEvents(tr);
  triggerSave();
}
function delRow(id,btn){
  btn.closest('tr').remove();
  const tbody=document.getElementById('tbody_'+id);
  const rc=document.querySelector(`[data-field="${id}__rc"]`);
  if(rc)rc.value=tbody.querySelectorAll('tr').length;
  triggerSave();
}

// ── SAVE / COLLECT ──────────────────────────────────────
function collectData(){
  const co=db.companies.find(c=>c.id===currentCompanyId);
  if(!co)return;
  if(!co.chapters)co.chapters={};
  if(!co.chapters[activeChapter])co.chapters[activeChapter]={};
  document.querySelectorAll('[data-field]').forEach(el=>{
    const k=el.dataset.field;
    if(el.type==='checkbox') co.chapters[activeChapter][k]=el.checked;
    else if(el.type==='hidden') co.chapters[activeChapter][k]=el.value;
    else co.chapters[activeChapter][k]=el.innerHTML;
  });
}
let saveTimer=null;
function triggerSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{collectData();save(db);},800);
}
function saveChapter(){collectData();save(db);showToast('已儲存 ✓');}

function bindEditorEvents(root){
  (root||document).querySelectorAll('[contenteditable],[data-field]').forEach(el=>{
    if(el.getAttribute('contenteditable')||el.type==='checkbox'||el.type==='hidden'){
      el.addEventListener('input',triggerSave);
      el.addEventListener('change',triggerSave);
    }
  });
}

// ── CHAPTER HELPERS ─────────────────────────────────────
function chapterHasData(co,chId){
  const d=co.chapters?.[chId];
  if(!d)return false;
  return Object.entries(d).some(([k,v])=>{
    if(k.endsWith('__rc'))return false;
    if(typeof v==='boolean')return v;
    const text=(v||'').replace(/<[^>]*>/g,'').trim();
    return text.length>0;
  });
}
function chapterProgress(co){return CHAPTERS.filter(ch=>chapterHasData(co,ch.id)).length;}

// ── RENDER ──────────────────────────────────────────────
function render(){
  const page=document.getElementById('page');
  const title=document.getElementById('page-title');
  if(currentPage==='dashboard'){title.textContent='總覽儀表板';page.innerHTML=renderDashboard();}
  else if(currentPage==='companies'){title.textContent='所有公司';page.innerHTML=renderCompanies();}
  else if(currentPage==='progress'){title.textContent='研究進度';page.innerHTML=renderProgress();}
  else if(currentPage==='research'){
    const co=db.companies.find(c=>c.id===currentCompanyId);
    title.textContent=co?co.name+' — 研究手冊':'研究手冊';
    page.innerHTML=renderResearch(co);
    bindEditorEvents();
  }
}

function searchFilter(v){filterIndustry='';filterStage='';

function filterByStage(v){filterStage=v;navigate('companies');}

  const rows=db.companies.map(c=>{const p=chapterProgress(c);return `<tr>
    <td style="padding:10px 12px;font-weight:600;cursor:pointer;color:var(--blue)" onclick="navigate('research',{companyId:'${c.id}',chapter:'c1'})">${c.name}</td>
    <td style="padding:10px 12px;color:var(--dark-gray)">${c.code||'—'}</td>
    <td style="padding:10px 12px"><span class="tag industry">${c.industry}</span></td>
    <td style="padding:10px 12px"><span class="tag stage">第${c.stage}階段</span></td>
    <td style="padding:10px 12px;min-width:160px">
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(p/14*100)}%"></div></div>
      <div style="font-size:11px;color:var(--dark-gray);margin-top:3px">${p}/14 章</div>
    </td>
    <td style="padding:10px 12px;font-size:13px;font-weight:600;color:${p===14?'var(--success)':p>0?'#744210':'var(--dark-gray)'}">
      ${p===14?'✅ 完成':p>0?'🔄 進行中':'⭕ 未開始'}
    </td>

  return `<div style="padding:24px"><div style="background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:14px">

        ${['公司','代號','產業','階段','進度','狀態'].map(h=>`<th style="padding:10px 12px;text-align:left;font-weight:600;color:var(--navy)">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div></div>`;
}

// ── RESEARCH SHELL ───────────────────────────────────────
function renderResearch(co){
  if(!co)return '<div style="padding:24px">找不到公司</div>';
  const d=co.chapters?.[activeChapter]||{};
  const idx=CHAPTERS.findIndex(c=>c.id===activeChapter);
  const chNav=CHAPTERS.map(ch=>`<button class="ch-btn ${ch.id===activeChapter?'active':''} ${chapterHasData(co,ch.id)?'done':''}"
    onclick="navigate('research',{companyId:'${co.id}',chapter:'${ch.id}'})">${chapterHasData(co,ch.id)?'✓ ':''}${ch.title.split('、')[0]}</button>`).join('');
  const prev=CHAPTERS[idx-1],next=CHAPTERS[idx+1];
  const p=chapterProgress(co);
  return `<div style="padding:24px">
    <div style="margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="navigate('companies')" style="font-size:12px">← 返回列表</button>
      <span style="font-size:13px;color:var(--dark-gray)">${p}/14 章</span>
      <div class="progress-bar" style="flex:1;min-width:80px"><div class="progress-fill" style="width:${Math.round(p/14*100)}%"></div></div>
    </div>
    <div class="chapter-nav">${chNav}</div>
    <div class="chapter-card">
      <div class="chapter-title">
        <span class="ch-check ${chapterHasData(co,activeChapter)?'done':''}">✓</span>
        ${CHAPTERS[idx].title}
      </div>
      <div class="chapter-body">${renderChapter(activeChapter,d)}</div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px">
      ${prev?`<button class="btn" onclick="navigate('research',{companyId:'${co.id}',chapter:'${prev.id}'})">← ${prev.title}</button>`:'<div></div>'}
      <button class="btn btn-primary" onclick="saveChapter()">💾 儲存本章</button>
      ${next?`<button class="btn" onclick="navigate('research',{companyId:'${co.id}',chapter:'${next.id}'})">下一章 →</button>`:'<div></div>'}
    </div>
  </div>`;
}

// ── MODALS ──────────────────────────────────────────────
function showModal(id){document.getElementById('modal-'+id).style.display='flex';}
function closeModal(id){document.getElementById('modal-'+id).style.display='none';}

function addCompany(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('請輸入公司名稱');return;}
  const co={id:'co_'+Date.now(),name,
    code:document.getElementById('new-code').value.trim(),
    industry:document.getElementById('new-industry').value,
    difficulty:document.getElementById('new-difficulty').value,
    stage:document.getElementById('new-stage').value,
    createdAt:new Date().toISOString(),chapters:{}};
  db.companies.push(co);
  save(db);
  closeModal('addCompany');
  ['new-name','new-code'].forEach(id=>document.getElementById(id).value='');
  navigate('research',{companyId:co.id,chapter:'c1'});
}

function confirmDelete(id,name){
  document.getElementById('delete-company-name').textContent=name;
  document.getElementById('confirm-delete-btn').onclick=()=>deleteCompany(id);
  showModal('deleteConfirm');
}
function deleteCompany(id){
  db.companies=db.companies.filter(c=>c.id!==id);
  save(db);closeModal('deleteConfirm');navigate('companies');
}

// ── EXPORT ──────────────────────────────────────────────
function exportData(){
  collectData();
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`equity_research_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();showToast('備份已下載 ✓');
}

// ── TOAST ───────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── INIT ────────────────────────────────────────────────
loadFromCloud().then(data=>{db=data;render();});
