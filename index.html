<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企業投資研究手冊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1F3864;--blue:#2E5FA3;--light-blue:#D6E4F7;--mid-blue:#BDD7EE;
  --accent:#C9A84C;--light-gray:#F7F8FA;--mid-gray:#E2E8F0;--dark-gray:#4A5568;
  --text:#1A202C;--success:#276749;--success-bg:#F0FFF4;--danger:#9B2C2C;--danger-bg:#FFF5F5;
  --border:#CBD5E0;--radius:8px;--font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);color:var(--text);background:#F0F4F8;min-height:100vh}

/* Layout */
#app{display:flex;min-height:100vh}
#sidebar{width:260px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:100;transition:transform .3s}
#main{margin-left:260px;flex:1;min-height:100vh}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-header h1{font-size:14px;font-weight:700;letter-spacing:.5px;color:#fff}
.sidebar-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-section{padding:8px 0}
.sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.4);padding:8px 16px 4px;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.75);border-left:3px solid transparent;transition:all .15s}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--accent)}
.sidebar-item .badge{margin-left:auto;background:rgba(255,255,255,.15);border-radius:10px;font-size:10px;padding:1px 7px}

/* Topbar */
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar h2{font-size:16px;font-weight:600;color:var(--navy)}
.topbar-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--dark-gray);transition:all .15s}
.btn:hover{background:var(--light-gray);border-color:#a0aec0}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:#162d52}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:#FEB2B2}

/* Page content */
#page{padding:24px;max-width:960px}

/* Dashboard cards */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;color:var(--navy)}
.stat-card .lbl{font-size:12px;color:var(--dark-gray);margin-top:4px}

/* Company cards */
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.company-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .2s;position:relative}
.company-card:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(46,95,163,.1)}
.company-card .co-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.co-name{font-size:15px;font-weight:700;color:var(--navy)}
.co-code{font-size:12px;color:var(--dark-gray);margin-top:2px}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;background:var(--light-blue);color:var(--navy)}
.tag.industry{background:#EBF8FF;color:#2B6CB0}
.tag.stage{background:#F0FFF4;color:var(--success)}
.tag.difficulty-low{background:#F0FFF4;color:var(--success)}
.tag.difficulty-mid{background:#FFFBF0;color:#744210}
.tag.difficulty-high{background:#FFF5F5;color:var(--danger)}
.co-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.progress-bar{height:6px;background:var(--mid-gray);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dark-gray);margin-top:4px}
.co-meta{font-size:11px;color:var(--dark-gray);margin-top:8px}

/* Filters */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.filter-select{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:#fff;color:var(--text);cursor:pointer}
.search-input{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:#fff;min-width:200px}
.search-input:focus{outline:none;border-color:var(--blue)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h3{font-size:17px;font-weight:700;color:var(--navy)}
.modal-body{overflow-y:auto;padding:24px;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--dark-gray);line-height:1;padding:4px}
.close-btn:hover{color:var(--text)}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--dark-gray);margin-bottom:6px}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:var(--font);color:var(--text)}
.form-control:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,95,163,.1)}
textarea.form-control{resize:vertical;min-height:80px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--dark-gray);margin-top:4px}

/* Research form */
.chapter-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:10px}
.ch-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--dark-gray);transition:all .15s}
.ch-btn:hover{border-color:var(--blue);color:var(--blue)}
.ch-btn.done{background:var(--success-bg);border-color:#9AE6B4;color:var(--success)}
.ch-btn.active{background:var(--navy);border-color:var(--navy);color:#fff}

.chapter-card{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.chapter-title{padding:16px 20px;background:var(--navy);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.chapter-title .ch-check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.chapter-title .ch-check.done{background:rgba(255,255,255,.9);border-color:transparent;color:var(--navy)}
.chapter-body{padding:20px}

.section-heading{font-size:13px;font-weight:700;color:var(--blue);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--light-blue);padding-bottom:4px}

/* Research boxes */
.research-box{background:#EBF8FF;border:1px solid #BEE3F8;border-left:4px solid var(--blue);border-radius:var(--radius);padding:16px;margin-top:16px}
.research-box .rb-title{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.source-box{background:#FFFBF0;border:1px solid #FAD089;border-left:4px solid var(--accent);border-radius:var(--radius);padding:16px;margin-top:12px}
.source-box .rb-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

/* Table input */
.table-input{width:100%;border-collapse:collapse;font-size:13px}
.table-input th{background:var(--mid-blue);color:var(--navy);font-weight:600;padding:8px 10px;text-align:left;border:1px solid var(--border)}
.table-input td{border:1px solid var(--border);padding:4px}
.table-input td input,.table-input td select{width:100%;padding:5px 8px;border:none;font-size:13px;background:transparent;font-family:var(--font);color:var(--text)}
.table-input td input:focus,.table-input td select:focus{outline:none;background:var(--light-blue)}
.table-input tr:nth-child(even) td{background:#f8fafc}

/* Checkbox list */
.check-list{list-style:none}
.check-list li{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--mid-gray);font-size:13px;color:var(--dark-gray)}
.check-list li:last-child{border-bottom:none}
.check-list li input[type=checkbox]{margin-top:2px;accent-color:var(--blue);width:15px;height:15px;flex-shrink:0;cursor:pointer}

/* Progress overview */
.chapter-progress{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:16px}
.ch-progress-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.ch-progress-item .ch-num{font-size:11px;color:var(--dark-gray)}
.ch-progress-item .ch-name{font-size:12px;font-weight:600;color:var(--navy);margin:4px 0}
.ch-progress-item .ch-status{font-size:11px}
.ch-status.done{color:var(--success)}
.ch-status.partial{color:#744210}
.ch-status.empty{color:var(--dark-gray)}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--dark-gray)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}
.empty-state h3{font-size:18px;font-weight:600;color:var(--navy);margin-bottom:8px}
.empty-state p{font-size:14px;line-height:1.6}

/* Divider */
.divider{height:1px;background:var(--mid-gray);margin:20px 0}

@media(max-width:700px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .form-row{grid-template-columns:1fr}
  .company-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header">
      <h1>📊 研究手冊</h1>
      <p>Equity Research Workbook</p>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">主選單</div>
      <div class="sidebar-item active" data-page="dashboard">🏠 總覽儀表板</div>
      <div class="sidebar-item" data-page="companies">🏢 所有公司</div>
      <div class="sidebar-item" data-page="progress">📈 研究進度</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">依產業篩選</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="半導體">💾 半導體</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="電子代工">🔧 電子代工</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="金融">🏦 金融</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="消費">🛍 消費</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="電信">📡 電信</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="原物料">🏗 原物料</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="航運">🚢 航運</div>
      <div class="sidebar-item" data-page="companies" data-filter-industry="其他">📦 其他</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">依階段篩選</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="1">① 公司基礎</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="2">② 財報分析</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="3">③ 報酬風險</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="4">④ 產業總體</div>
      <div class="sidebar-item" data-page="companies" data-filter-stage="5">⑤ 投資整合</div>
    </div>
    <div style="padding:16px;margin-top:auto;border-top:1px solid rgba(255,255,255,.1)">
      <button class="btn btn-accent" onclick="showModal('addCompany')" style="width:100%;justify-content:center">+ 新增公司</button>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <h2 id="page-title">總覽儀表板</h2>
      <div class="topbar-actions">
        <button class="btn" onclick="exportData()">⬇ 匯出備份</button>
        <button class="btn btn-primary" onclick="showModal('addCompany')">+ 新增公司</button>
      </div>
    </div>
    <div id="page"></div>
  </div>
</div>

<!-- Add Company Modal -->
<div id="modal-addCompany" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>新增研究公司</h3>
      <button class="close-btn" onclick="closeModal('addCompany')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>公司名稱 *</label>
          <input class="form-control" id="new-name" placeholder="例：台積電">
        </div>
        <div class="form-group">
          <label>股票代號</label>
          <input class="form-control" id="new-code" placeholder="例：2330">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>產業別</label>
          <select class="form-control" id="new-industry">
            <option>半導體</option><option>電子代工</option><option>金融</option>
            <option>消費</option><option>電信</option><option>原物料</option>
            <option>航運</option><option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>研究難度</label>
          <select class="form-control" id="new-difficulty">
            <option value="low">低（適合入門）</option>
            <option value="mid" selected>中</option>
            <option value="high">中高</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>目前所屬階段（依系主任學習地圖）</label>
        <select class="form-control" id="new-stage">
          <option value="1">第一階段 — 公司與產業基礎</option>
          <option value="2">第二階段 — 財報與企業價值</option>
          <option value="3">第三階段 — 報酬風險與統計</option>
          <option value="4">第四階段 — 產業與總體環境</option>
          <option value="5">第五階段 — 投資判斷整合</option>
        </select>
      </div>
      <div class="form-group">
        <label>簡要說明（選填）</label>
        <textarea class="form-control" id="new-desc" placeholder="一句話說明這家公司主要業務…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('addCompany')">取消</button>
      <button class="btn btn-primary" onclick="addCompany()">建立研究檔案</button>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="modal-deleteConfirm" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3>確認刪除</h3>
      <button class="close-btn" onclick="closeModal('deleteConfirm')">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;line-height:1.7">確定要刪除 <strong id="delete-company-name"></strong> 的研究檔案嗎？此操作無法復原，所有填寫資料將永久消失。</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('deleteConfirm')">取消</button>
      <button class="btn btn-danger" id="confirm-delete-btn">確認刪除</button>
    </div>
  </div>
</div>

<div id="toast">已儲存</div>

<script>
// ── DATA ────────────────────────────────────────────────
const STORAGE_KEY = 'equity_research_db';
const CHAPTERS = [
  {id:'c1', title:'一、公司基本資料與定位'},
  {id:'c2', title:'二、商業模式與價值鏈分析'},
  {id:'c3', title:'三、管理層分析與資本配置'},
  {id:'c4', title:'四、護城河與競爭優勢'},
  {id:'c5', title:'五、產業分析與市場結構'},
  {id:'c6', title:'六、經濟學專題思考'},
  {id:'c7', title:'七、總體經濟與景氣循環'},
  {id:'c8', title:'八、財務報表分析'},
  {id:'c9', title:'九、財報品質分析'},
  {id:'c10',title:'十、同業比較分析'},
  {id:'c11',title:'十一、估值分析與股東結構'},
  {id:'c12',title:'十二、風險分析'},
  {id:'c13',title:'十三、證據矩陣'},
  {id:'c14',title:'十四、投資論文與決策'},
];

function load(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"companies":[]}');}
function save(db){localStorage.setItem(STORAGE_KEY,JSON.stringify(db));}

// ── STATE ───────────────────────────────────────────────
let db = load();
let currentPage = 'dashboard';
let currentCompanyId = null;
let activeChapter = 'c1';
let filterIndustry = '';
let filterStage = '';
let deleteTargetId = null;

// ── ROUTING ─────────────────────────────────────────────
function navigate(page, opts={}){
  currentPage = page;
  if(opts.companyId) currentCompanyId = opts.companyId;
  if(opts.chapter) activeChapter = opts.chapter;
  if(opts.industry !== undefined) filterIndustry = opts.industry;
  if(opts.stage !== undefined) filterStage = opts.stage;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  if(page === 'dashboard') document.querySelector('[data-page="dashboard"]').classList.add('active');
  if(page === 'companies') document.querySelector('[data-page="companies"]').classList.add('active');
  if(page === 'progress') document.querySelector('[data-page="progress"]').classList.add('active');
  render();
}

document.querySelectorAll('.sidebar-item').forEach(el => {
  el.addEventListener('click', ()=>{
    const p = el.dataset.page;
    const ind = el.dataset.filterIndustry||'';
    const st = el.dataset.filterStage||'';
    navigate(p, {industry: ind, stage: st});
  });
});

// ── RENDER ──────────────────────────────────────────────
function render(){
  const page = document.getElementById('page');
  const title = document.getElementById('page-title');
  if(currentPage==='dashboard'){title.textContent='總覽儀表板'; page.innerHTML = renderDashboard();}
  else if(currentPage==='companies'){title.textContent='所有公司'; page.innerHTML = renderCompanies();}
  else if(currentPage==='progress'){title.textContent='研究進度'; page.innerHTML = renderProgress();}
  else if(currentPage==='research'){
    const co = db.companies.find(c=>c.id===currentCompanyId);
    title.textContent = co ? co.name+' — 研究手冊' : '研究手冊';
    page.innerHTML = renderResearch(co);
    bindResearchEvents(co);
  }
}

// ── DASHBOARD ───────────────────────────────────────────
function renderDashboard(){
  const cos = db.companies;
  const total = cos.length;
  const done = cos.filter(c=>chapterProgress(c)===14).length;
  const inProgress = cos.filter(c=>{const p=chapterProgress(c); return p>0&&p<14;}).length;
  const industries = [...new Set(cos.map(c=>c.industry))].length;

  const recentCards = cos.slice().reverse().slice(0,3).map(c=>`
    <div class="company-card" onclick="navigate('research',{companyId:'${c.id}',chapter:'c1'})">
      <div class="co-header">
        <div><div class="co-name">${c.name}</div><div class="co-code">${c.code||'—'}</div></div>
        <span class="tag industry">${c.industry}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(chapterProgress(c)/14*100)}%"></div></div>
      <div class="progress-label"><span>第${c.stage}階段</span><span>${chapterProgress(c)}/14 章</span></div>
    </div>`).join('');

  return `<div id="page" style="padding:24px">
    <div class="stat-grid">
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">研究公司總數</div></div>

// ── RESEARCH ────────────────────────────────────────────
function chapterProgress(co){
  if(!co.chapters) return 0;
  return CHAPTERS.filter(ch=>{
    const d = co.chapters[ch.id];
    if(!d) return false;
    return Object.values(d).some(v=>typeof v==='string'?v.trim().length>0:(typeof v==='boolean'?v:false));
  }).length;
}

function isChapterDone(co, chId){
  if(!co.chapters||!co.chapters[chId]) return false;
  const d = co.chapters[chId];
  return Object.values(d).some(v=>typeof v==='string'?v.trim().length>0:(typeof v==='boolean'?v:false));
}

function renderResearch(co){
  if(!co) return '<div style="padding:24px">找不到公司</div>';

  const chNav = CHAPTERS.map(ch=>`
    <button class="ch-btn ${ch.id===activeChapter?'active':''} ${isChapterDone(co,ch.id)?'done':''}"
      onclick="navigate('research',{companyId:'${co.id}',chapter:'${ch.id}'})">
      ${isChapterDone(co,ch.id)?'✓ ':''} ${ch.title.split('、')[0].replace(/[一二三四五六七八九十]+/,'$&')}
    </button>`).join('');

  const ch = co.chapters||{};
  const d = ch[activeChapter]||{};

  let chapterHTML = '';
  if(activeChapter==='c1') chapterHTML = renderC1(d);
  else if(activeChapter==='c2') chapterHTML = renderC2(d);
  else if(activeChapter==='c3') chapterHTML = renderC3(d);
  else if(activeChapter==='c4') chapterHTML = renderC4(d);
  else if(activeChapter==='c5') chapterHTML = renderC5(d);
  else if(activeChapter==='c6') chapterHTML = renderC6(d);
  else if(activeChapter==='c7') chapterHTML = renderC7(d);
  else if(activeChapter==='c8') chapterHTML = renderC8(d);
  else if(activeChapter==='c9') chapterHTML = renderC9(d);
  else if(activeChapter==='c10') chapterHTML = renderC10(d);
  else if(activeChapter==='c11') chapterHTML = renderC11(d);
  else if(activeChapter==='c12') chapterHTML = renderC12(d);
  else if(activeChapter==='c13') chapterHTML = renderC13(d);
  else if(activeChapter==='c14') chapterHTML = renderC14(d);

  const idx = CHAPTERS.findIndex(c=>c.id===activeChapter);
  const prevCh = idx>0?CHAPTERS[idx-1]:null;
  const nextCh = idx<CHAPTERS.length-1?CHAPTERS[idx+1]:null;

  return `<div style="padding:24px">
    <div style="margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="navigate('companies')" style="font-size:12px">← 返回列表</button>
      <span style="font-size:13px;color:var(--dark-gray)">研究進度：${chapterProgress(co)}/14 章</span>
      <div class="progress-bar" style="flex:1;min-width:100px"><div class="progress-fill" style="width:${Math.round(chapterProgress(co)/14*100)}%"></div></div>
    </div>
    <div class="chapter-nav">${chNav}</div>
    <div class="chapter-card">
      <div class="chapter-title">
        <span class="ch-check ${isChapterDone(co,activeChapter)?'done':''}">✓</span>
        ${CHAPTERS[idx].title}
      </div>
      <div class="chapter-body">${chapterHTML}</div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px;flex-wrap:wrap;gap:8px">
      ${prevCh?`<button class="btn" onclick="navigate('research',{companyId:'${co.id}',chapter:'${prevCh.id}'})">← ${prevCh.title}</button>`:'<div></div>'}
      <button class="btn btn-primary" onclick="saveChapter()">💾 儲存本章</button>
      ${nextCh?`<button class="btn" onclick="navigate('research',{companyId:'${co.id}',chapter:'${nextCh.id}'})">下一章 →</button>`:'<div></div>'}
    </div>
  </div>`;
}

function tableInput(id, headers, rows, data={}){

// ── BIND SAVE ───────────────────────────────────────────
function bindResearchEvents(co){
  document.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('change', ()=>autoSave(co));
    if(el.tagName==='TEXTAREA'||el.tagName==='INPUT') el.addEventListener('input', ()=>autoSave(co));
  });
}

let saveTimer = null;
function autoSave(co){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>saveChapterData(co), 800);
}

function saveChapter(){
  const co = db.companies.find(c=>c.id===currentCompanyId);
  if(!co) return;
  saveChapterData(co);
  showToast('已儲存 ✓');
}

function saveChapterData(co){
  if(!co.chapters) co.chapters = {};
  if(!co.chapters[activeChapter]) co.chapters[activeChapter] = {};
  document.querySelectorAll('[data-field]').forEach(el=>{
    const key = el.dataset.field;
    if(el.type==='checkbox') co.chapters[activeChapter][key] = el.checked;
    else co.chapters[activeChapter][key] = el.value;
  });
  save(db);
}

// ── MODALS ──────────────────────────────────────────────
function showModal(id){document.getElementById('modal-'+id).style.display='flex';}
function closeModal(id){document.getElementById('modal-'+id).style.display='none';}

function addCompany(){
  const name = document.getElementById('new-name').value.trim();
  if(!name){alert('請輸入公司名稱');return;}
  const co = {
    id: 'co_'+Date.now(),
    name,
    code: document.getElementById('new-code').value.trim(),
    industry: document.getElementById('new-industry').value,
    difficulty: document.getElementById('new-difficulty').value,
    stage: document.getElementById('new-stage').value,
    createdAt: new Date().toISOString(),
    chapters: {}
  };
  db.companies.push(co);
  save(db);
  closeModal('addCompany');
  document.getElementById('new-name').value='';
  document.getElementById('new-code').value='';
  navigate('research',{companyId:co.id, chapter:'c1'});
}

function confirmDelete(id, name){
  deleteTargetId = id;
  document.getElementById('delete-company-name').textContent = name;
  document.getElementById('confirm-delete-btn').onclick = ()=>deleteCompany(id);
  showModal('deleteConfirm');
}

function deleteCompany(id){
  db.companies = db.companies.filter(c=>c.id!==id);
  save(db);
  closeModal('deleteConfirm');
  navigate('companies');
}

// ── EXPORT ──────────────────────────────────────────────
function exportData(){
  const blob = new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `equity_research_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('備份已下載 ✓');
}

// ── TOAST ───────────────────────────────────────────────
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ── INIT ────────────────────────────────────────────────
render();
</script>
